# MDAL — Example Configuration
# Copy this file to mdal.yaml and adjust as needed.
# Never commit production configs with API keys — use mdal.local.yaml (in .gitignore).

llm:
  url: "http://localhost:11434"   # Ollama default; or any OpenAI-compatible endpoint
  model: "mistral:latest"
  timeout: 120
  # api_key: "sk-..."             # Optional — for commercial APIs

embedding:
  url: "http://localhost:11434"
  model: "nomic-embed-text"
  timeout: 30

fingerprint_path: "./fingerprints/default"

plugin_registry_path: "./plugins"

audit:
  target: "file"                  # "file" | "postgresql" | "mysql" | "mssql"
  path: "./audit/mdal.log"
  # connection_string: "postgresql://user:pass@host/db"   # for DB targets

checks:
  semantic: true
  structure: true
  # At least one check must be active (F18).
  # Setting both to false simultaneously is not permitted.

notifier:
  log_path: "./logs/escalations.log"
  # webhook_url: "https://example.com/hooks/mdal-escalation"

# Fallback model (F9) — optional
# fallback_llm:
#   url: "http://localhost:11434"
#   model: "gemma2"
#   timeout: 60
