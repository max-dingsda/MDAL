llm:
  url: http://localhost:11434
  model: mistral
  timeout: 240
embedding:
  url: http://localhost:11434
  model: nomic-embed-text
  timeout: 30
fingerprint_path: ./fingerprints/default
plugin_registry_path: ./plugins
audit:
  target: file
  path: F:/workspace/MDAL/logs/mdal.log
checks:
  semantic: true
  structure: false
max_retries: 2
notifier:
  log_path: ./logs/escalations.log
env_start_cmd: conda activate mdal
