# MDAL Proxy Configuration — Phase 6 Pipeline Test
llm:
  url: "http://localhost:11434"
  model: "llama3.1:8b"      # same model as trainer → baseline
  timeout: 120

embedding:
  url: "http://localhost:11434"
  model: "nomic-embed-text"
  timeout: 60

fingerprint_path: "./fingerprints/default"

plugin_registry_path: "./plugins"

audit:
  target: "file"
  path: "./audit/proxy_test.log"

checks:
  semantic: true
  structure: true

notifier:
  log_path: "./logs/escalations.log"
