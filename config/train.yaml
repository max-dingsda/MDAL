# MDAL Trainer Configuration — Phase 6 Calibration Run
# LLM for style rule extraction and golden sample selection
llm:
  url: "http://localhost:11434"
  model: "llama3.1:8b"
  timeout: 120

# Embedding model for Layer 2 vectors
embedding:
  url: "http://localhost:11434"
  model: "nomic-embed-text"
  timeout: 60

fingerprint_path: "./fingerprints/default"

plugin_registry_path: "./plugins"

audit:
  target: "file"
  path: "./audit/trainer.log"

checks:
  semantic: true
  structure: true

notifier:
  log_path: "./logs/escalations.log"
